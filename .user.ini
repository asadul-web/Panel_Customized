; PHP Configuration for Performance Optimization

; Memory and Execution Time - OPTIMIZED
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
post_max_size = 64M
upload_max_filesize = 64M

; Error Handling - CRITICAL for production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
error_log = logs/php_errors.log

; Output Buffering
output_buffering = 4096
zlib.output_compression = On
zlib.output_compression_level = 6

; Session Configuration
session.gc_maxlifetime = 3600
session.gc_probability = 1
session.gc_divisor = 100
session.cookie_httponly = 1
session.use_strict_mode = 1

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; OPcache Settings - OPTIMIZED FOR PERFORMANCE
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.save_comments = 1

; MySQL/MySQLi
mysqli.reconnect = On
mysqli.allow_persistent = On
mysqli.max_persistent = 10
mysqli.max_links = 20

; CURL Timeout Settings
default_socket_timeout = 10
